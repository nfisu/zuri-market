name: Zuri Market CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run backend npm audit
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Run frontend npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t nfisu/zuri-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t nfisu/zuri-frontend:latest ./frontend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nfisu/zuri-backend:latest
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nfisu/zuri-frontend:latest
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Push backend image
        run: docker push nfisu/zuri-backend:latest

      - name: Push frontend image
        run: docker push nfisu/zuri-frontend:latest